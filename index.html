<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>PROCESS BREWING</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="main-nav">
