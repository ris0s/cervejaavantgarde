<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROCESS BREWING</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="search-icon">🔍</div>
            <h1 class="main-logo">PROCESS</h1>
            <div class="cart-icon">🛒</div>
        </div>

        <div class="hero-grid">
            <div class="hero-col left">
                <nav class="primary-nav">
                    <a href="#">ACADÊMICO</a>
                    <a href="#">SOBRE NÓS</a>
                    <a href="#">CONTRATOS</a>
                    <a href="#">POLÍTICA DE PRIVACIDADE</a>
                </nav>
            </div>

            <div class="hero-col center">
                <img src="logo.png" alt="Process Illustration" class="hero-illustration">
            </div>

            <div class="hero-col right">
                <nav class="secondary-nav">
                    <div class="nav-top">
                        <a href="#">ALES</a>
                        <a href="#">MERCH</a>
                    </div>
                    <div class="network-box">
                        <h2>JOIN THE NETWORK</h2>
                        <div class="user-avatars">
                            <div class="avatar" style="background-image: url('https://i.pravatar.cc/100?img=1')"></div>
                            <div class="avatar" style="background-image: url('https://i.pravatar.cc/100?img=2')"></div>
                            <div class="avatar" style="background-image: url('https://i.pravatar.cc/100?img=3')"></div>
                        </div>
                        <button class="btn btn-black">LOGIN</button>
                        <button class="btn btn-outline">CREATE ACCOUNT</button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <section class="releases">
        <h2 class="section-title">FEATURED RELEASES</h2>
        
        <div class="product-grid">
            <div class="product-item">
                <div class="side-label left">LIMITED RELEASE</div>
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1614316345681-42cb91b92e74?q=80&w=400" alt="The Trial">
                    <div class="product-meta">
                        <span>The Trial</span>
                        <span>R$ 45,00</span>
                    </div>
                </div>
            </div>

            <div class="product-item">
                <div class="product-card active">
                    <img src="https://images.unsplash.com/photo-1566416668744-2f2f7902d184?q=80&w=400" alt="Main Bus">
                    <div class="product-meta">
                        <span>Main Bus</span>
                        <span>R$ 50,00</span>
                    </div>
                </div>
            </div>

            <div class="product-item">
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1657218671842-8854ba5f514b?q=80&w=400" alt="Vira-Lata">
                    <div class="product-meta">
                        <span>Vira-Lata</span>
                        <span>R$ 38,00</span>
                    </div>
                </div>
                <div class="side-label right">DATA DRIVEN</div>
            </div>
        </div>
    </section>

</body>
</html>
